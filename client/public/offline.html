<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYE — Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #0a0a0a;
      color: #cbd5e1;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background-color: #dc2626;
      color: #ffffff;
      font-size: 24px;
      font-weight: 900;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.3);
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      margin: 0;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">A</div>
  <h1>You're offline</h1>
  <p>Your dashboard will be back when you reconnect to the network.</p>
</body>
</html>
